name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: remi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d remi_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # CI Postgres requires auth; localhost in .env.test does not. CI env wins.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/remi_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # pretest hook handles `db:push:test`, which respects DATABASE_URL above.
      - run: npm test
